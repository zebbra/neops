# 
# -------------------------------------------
# 
# THIS FILE IS AUTOGENERATED, DO NOT EDIT!
# Instead, perform your changes or extensions (to mkdocs_base.yml) in mkdocs_custom.yml
# These files will be merged together into mkdocs.yml (this file)
# 
# -------------------------------------------
# 
copyright: Copyright &copy; Zebbra AG
edit_uri: edit/main/docs
extra:
  social:
  - icon: fontawesome/solid/house
    link: https://neops.io
    name: Neops
hooks:
- .make_scripts/mkdocs-documentation/hooks/inline_nav_include.py
- .make_scripts/mkdocs-documentation/hooks/fix_symlinks.py
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- admonition
- pymdownx.details
- pymdownx.superfences:
    custom_fences:
    - class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
      name: mermaid
- pymdownx.inlinehilite
- pymdownx.snippets:
    base_path:
    - !relative
    check_paths: true
    restrict_base_path: false
- pymdownx.emoji:
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
    emoji_index: !!python/name:material.extensions.emoji.twemoji
- pymdownx.tabbed:
    alternate_style: true
- attr_list
- md_in_html
- pymdownx.keys
- pymdownx.tasklist:
    custom_checkbox: true
- abbr
- footnotes
- pymdownx.tilde
- pymdownx.caret
- pymdownx.mark
- smarty
- pymdownx.smartsymbols
- pymdownx.magiclink
- pymdownx.betterem
nav:
- Home: index.md
- Getting Started: getting-started
- Concepts: concepts
- User Guide: coming-soon.md
- Workflows: '!include ./docs/neops-workflow-engine/mkdocs_custom.yml'
- Function Blocks: '!include ./docs/neops-worker-sdk-py/mkdocs_custom.yml'
- Remote Lab: '!include ./docs/neops-remote-lab/mkdocs_custom.yml'
- Installation & Deployment: installation
- Modules:
  - Index: modules/index.md
  - Secure Gateway: '!include ./docs/neops-secure-gateway/mkdocs_custom.yml'
plugins:
- search
- include_dir_to_nav
- git-authors
repo_url: https://github.com/zebbra/neops
site_name: Neops Docs
theme:
  custom_dir: docs/override
  favicon: assets/favicon.png
  features:
  - content.code.annotate
  - content.code.copy
  - content.tabs.link
  - header.autohide
  - announce.dismiss
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.path
  - navigation.top
  - navigation.tracking
  - navigation.instant
  - search.share
  - search.suggest
  - search.highlight
  - content.action.edit
  - toc.follow
  logo: assets/logo.svg
  name: material
  palette:
  - media: (prefers-color-scheme)
    toggle:
      icon: material/link
      name: Switch to light mode
  - accent: indigo
    media: '(prefers-color-scheme: light)'
    primary: blue grey
    scheme: default
    toggle:
      icon: material/toggle-switch
      name: Switch to dark mode
  - accent: deep orange
    media: '(prefers-color-scheme: dark)'
    primary: black
    scheme: slate
    toggle:
      icon: material/toggle-switch-off
      name: Switch to system preference
